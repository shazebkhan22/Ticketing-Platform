services:
  postgres:
    image: postgres:16-alpine
    container_name: cygnus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cygnus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cygnus_ticketing
    ports:
      - "5432:5432"
    volumes:
      - cygnus_pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cygnus_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - cygnus_pgadmin_data:/var/lib/pgadmin

volumes:
  cygnus_pg_data:
  cygnus_pgadmin_data:
