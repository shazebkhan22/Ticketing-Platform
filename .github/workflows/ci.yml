name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cygnus
          POSTGRES_PASSWORD: cygnus_dev_password
          POSTGRES_DB: cygnus_ticketing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cygnus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      TEST_DATABASE_URL: postgresql://cygnus:cygnus_dev_password@localhost:5432/cygnus_ticketing_test
      DATABASE_URL: postgresql://cygnus:cygnus_dev_password@localhost:5432/cygnus_ticketing_test
      SESSION_SECRET: ci-session-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.json
      - run: npm run test
      - run: npm run test:e2e

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
