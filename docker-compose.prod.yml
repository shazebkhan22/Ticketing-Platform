services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cygnus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cygnus_ticketing
    volumes:
      - cygnus_pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://cygnus:${POSTGRES_PASSWORD}@postgres:5432/cygnus_ticketing
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_MAX_AGE_MINUTES: ${SESSION_MAX_AGE_MINUTES:-60}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  cygnus_pg_data:
